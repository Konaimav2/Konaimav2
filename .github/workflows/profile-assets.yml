name: Generate profile assets

on:
  workflow_dispatch:
  schedule:
    - cron: '23 18 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate 3D contribution chart
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Konaimav2

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Konaimav2
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit generated assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update generated profile assets'
          file_pattern: 'profile-3d-contrib/*.svg dist/*.svg README.md'
